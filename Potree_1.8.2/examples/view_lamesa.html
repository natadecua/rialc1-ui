<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="description" content="La Mesa Ecopark - Tree Segmentation Viewer">
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Potree Viewer - La Mesa Ecopark</title>

	<link rel="stylesheet" type="text/css" href="../build/potree/potree.css">
	<link rel="stylesheet" type="text/css" href="../libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" type="text/css" href="../libs/openlayers3/ol.css">
	<link rel="stylesheet" type="text/css" href="../libs/spectrum/spectrum.css">
	<link rel="stylesheet" type="text/css" href="../libs/jstree/themes/mixed/style.css">
</head>

<body>
	<script src="../libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="../libs/spectrum/spectrum.js"></script>
	<script src="../libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="../libs/other/BinaryHeap.js"></script>
	<script src="../libs/tween/tween.min.js"></script>
	<script src="../libs/d3/d3.js"></script>
	<script src="../libs/proj4/proj4.js"></script>
	<script src="../libs/openlayers3/ol.js"></script>
	<script src="../libs/i18next/i18next.js"></script>
	<script src="../libs/jstree/jstree.js"></script>
	<script src="../build/potree/potree.js"></script>
	<script src="../libs/plasio/js/laslaz.js"></script>
	<script src="../libs/shapefile/shapefile.js"></script>
	
	<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
		<div id="potree_render_area" style="background-image: url('../build/potree/resources/images/background.jpg');"></div>
		<div id="potree_sidebar_container"> </div>
	</div>
	
	<script type="module">

		import * as THREE from "../libs/three.js/build/three.module.js";
	
        // ====================================================================================
		// STEP 1: INITIALIZE THE VIEWER
        // ====================================================================================
		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
		
		viewer.setEDLEnabled(true); // Eye-Dome Lighting helps with depth perception
		viewer.setFOV(60);
		viewer.setPointBudget(2_500_000); // Adjust as needed for performance
		viewer.loadSettingsFromURL();
		
		viewer.setDescription('La Mesa Ecopark: Tree Classification Results');
		
		viewer.loadGUI(() => {
			viewer.setLanguage('en');
			$("#menu_tools").next().show();
			$("#menu_scene").next().show();
			viewer.toggleSidebar();
		});
		
        // ====================================================================================
		// STEP 2: LOAD YOUR POINT CLOUD
        // ====================================================================================
		Potree.loadPointCloud(
            ".../raw_data/lamesa_normalized_intensity_converted/metadata.json", // <-- YOUR FILE PATH
            "La Mesa Forest", 
            async e => {
			
			let scene = viewer.scene;
			let pointcloud = e.pointcloud;
			let material = pointcloud.material;
			scene.addPointCloud(pointcloud);
			
			material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
			material.size = 1.0;
            material.activeAttributeName = "intensity"; // Or "rgba" if you have color
			
            // ================================================================================
			// STEP 3: SET INITIAL CAMERA VIEW
			// To find these values: Navigate where you want in the viewer,
			// open the browser console (F12), and type: `viewer.scene.view.toString()`
			// Then copy the output here.
            // ================================================================================
			scene.view.position.set(507844.7, 1627083.5, 332.9); // <-- REPLACE with your coordinates
			scene.view.lookAt(new THREE.Vector3(507474.9, 1627448.9, -15.1)); // <-- REPLACE with your coordinates
			
            // ================================================================================
			// STEP 4: LOAD SHAPEFILES (Following the provided example)
            // ================================================================================
			{
				// STEP 4.1: DEFINE SHAPEFILE COORDINATE SYSTEM (Usually WGS84)
				proj4.defs("WGS84", "+proj=longlat +ellps=WGS84 +datum=WGS84 +no_defs");
				
                // <-- STEP 4.2: DEFINE YOUR POINT CLOUD'S PROJECTION HERE
                // This is CRITICAL. Get this from your metadata.json file.
				proj4.defs("pointcloud", pointcloud.projection);
				
				let transform = proj4("WGS84", "pointcloud");

				const loader = new Potree.ShapefileLoader();
				loader.transform = transform;

				// Create a parent node to hold all shapefile layers for organization
				const segmentationNode = new THREE.Object3D();
                segmentationNode.name = "Segmentation Results";
				viewer.scene.scene.add(segmentationNode);


				// Load CORRECT predictions shapefile and color it GREEN
				const shpCorrect = await loader.load("../raw_data/shapefiles/mcws.shp");
				segmentationNode.add(shpCorrect.node);

				shpCorrect.node.traverse(node => {
					if(node.material){
						node.material.color.setRGB(0, 1, 0); // Green
					}
				});
				

				// This ensures line widths are rendered correctly if you use line shapefiles
				viewer.addEventListener("update", () => {
					const size = viewer.renderer.getSize(new THREE.Vector2());
					shpCorrect.setResolution(size.width, size.height);
					shpIncorrect.setResolution(size.width, size.height);
					shpTraining.setResolution(size.width, size.height);
				});

                // ================================================================================
				// STEP 5: ADD THE LOADED SHAPEFILES TO THE SIDEBAR
                // ================================================================================
				viewer.onGUILoaded(() => {
					let tree = $(`#jstree_scene`);
					let parentNode = "other"; // Add the layers to the "Other" category in the sidebar

					let shpCorrectID = tree.jstree('create_node', parentNode, { 
							"text": "Correct Predictions", 
							"icon": `${Potree.resourcePath}/icons/triangle.svg`,
							"object": shpCorrect.node,
							"data": shpCorrect.node,
						}, "last", false, false);
					tree.jstree(shpCorrect.node.visible ? "check_node" : "uncheck_node", shpCorrectID);

					let shpIncorrectID = tree.jstree('create_node', parentNode, { 
							"text": "Incorrect Predictions", 
							"icon": `${Potree.resourcePath}/icons/triangle.svg`,
							"object": shpIncorrect.node,
							"data": shpIncorrect.node,
						}, "last", false, false);
					tree.jstree(shpIncorrect.node.visible ? "check_node" : "uncheck_node", shpIncorrectID);

					let shpTrainingID = tree.jstree('create_node', parentNode, { 
							"text": "Training Data", 
							"icon": `${Potree.resourcePath}/icons/triangle.svg`,
							"object": shpTraining.node,
							"data": shpTraining.node,
						}, "last", false, false);
					tree.jstree(shpTraining.node.visible ? "check_node" : "uncheck_node", shpTrainingID);
				});
			}
		});
	</script>
  </body>
</html>
