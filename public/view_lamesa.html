<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="description" content="La Mesa Ecopark - Tree Segmentation Viewer">
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Potree Viewer - La Mesa Ecopark</title>

	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/build/potree/potree.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/openlayers3/ol.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/spectrum/spectrum.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/jstree/themes/mixed/style.css">
</head>

<body>
	<script src="/Potree_1.8.2/libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="/Potree_1.8.2/libs/spectrum/spectrum.js"></script>
	<script src="/Potree_1.8.2/libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="/Potree_1.8.2/libs/other/BinaryHeap.js"></script>
	<script src="/Potree_1.8.2/libs/tween/tween.min.js"></script>
	<script src="/Potree_1.8.2/libs/d3/d3.js"></script>
	<script src="/Potree_1.8.2/libs/proj4/proj4.js"></script>
	<script src="/Potree_1.8.2/libs/openlayers3/ol.js"></script>
	<script src="/Potree_1.8.2/libs/i18next/i18next.js"></script>
	<script src="/Potree_1.8.2/libs/jstree/jstree.js"></script>
	<script src="/Potree_1.8.2/build/potree/potree.js"></script>
	<script src="/Potree_1.8.2/libs/plasio/js/laslaz.js"></script>
	<script src="/Potree_1.8.2/libs/shapefile/shapefile.js"></script>
	
	<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
		<div id="potree_render_area" style="background-image: url('/Potree_1.8.2/build/potree/resources/images/background.jpg');"></div>
		<div id="potree_sidebar_container"> </div>
	</div>
	
	<script type="module">

		import * as THREE from "/Potree_1.8.2/libs/three.js/build/three.module.js";
	
        // ====================================================================================
		// STEP 1: INITIALIZE THE VIEWER
        // ====================================================================================
		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
		
		viewer.setEDLEnabled(true); // Eye-Dome Lighting helps with depth perception
		viewer.setFOV(60);
		viewer.setPointBudget(2_500_000); // Adjust as needed for performance
		viewer.loadSettingsFromURL();
		
		viewer.setDescription('La Mesa Ecopark: Tree Classification Results');
		
		viewer.loadGUI(() => {
			viewer.setLanguage('en');
			$("#menu_tools").next().show();
			$("#menu_scene").next().show();
			viewer.toggleSidebar();
		});
		
        // ====================================================================================
		// STEP 2: LOAD YOUR POINT CLOUD
        // ====================================================================================
		Potree.loadPointCloud(
			"/raw_data/merged_recropped_brotli/metadata.json", // Brotli-compressed dataset
            "La Mesa Forest", 
            async e => {
			
			let scene = viewer.scene;
			let pointcloud = e.pointcloud;
			let material = pointcloud.material;
			scene.addPointCloud(pointcloud);
			
			material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
			material.size = 0.6; // Slightly smaller points so linework stands out
			material.minSize = 0.4;
			material.shape = Potree.PointShape.CIRCLE;
			material.opacity = 0.65; // Reduce point cloud opacity to make overlays visible
            material.activeAttributeName = "rgba"; // Or "rgba" if you have color
			
            // ================================================================================
			// STEP 3: SET INITIAL CAMERA VIEW
			// To find these values: Navigate where you want in the viewer,
			// open the browser console (F12), and type: `viewer.scene.view.toString()`
			// Then copy the output here.
            // ================================================================================
			scene.view.position.set(507844.7, 1627083.5, 332.9); // <-- REPLACE with your coordinates
			scene.view.lookAt(new THREE.Vector3(507474.9, 1627448.9, -15.1)); // <-- REPLACE with your coordinates
			
            // ================================================================================
			// STEP 4: LOAD SHAPEFILES (Following the provided example)
            // ================================================================================
			{
				// STEP 4.1: DEFINE THE SHAPEFILE AND POINT CLOUD COORDINATE SYSTEMS (PRS92 Zone III)
				const prs92Zone3 = "+proj=tmerc +lat_0=0 +lon_0=121 +k=0.99995 +x_0=500000 +y_0=0 +a=6378206.4 +b=6356583.799999996 +units=m +no_defs";
				proj4.defs("PRS92_ZONE3", prs92Zone3);
				proj4.defs("pointcloud", prs92Zone3);
				const transform = proj4("PRS92_ZONE3", "pointcloud");

				const loader = new Potree.ShapefileLoader();
				loader.transform = transform;

				// Group all shapefile layers together for easier toggling
				const segmentationNode = new THREE.Object3D();
				segmentationNode.name = "Segmentation Results";
				viewer.scene.scene.add(segmentationNode);

                // Load the lines shapefile and apply styling
                const linesPath = "/raw_data/shapefiles/lines_new.shp";
                let lines = null;
                try {
                    lines = await loader.load(encodeURI(linesPath));
                    segmentationNode.add(lines.node);
                    
                    // Apply special styling for the lines
                    lines.node.traverse(node => {
                        if (node.isMesh || node.isLine) {
                            node.renderOrder = 1000; // Render lines on top of polygons
                        }
                        if (node.material) {
                            node.material.color.setRGB(1, 0, 0); // Red color for lines
                            node.material.opacity = 0.9;
                            node.material.transparent = true;
                            node.material.depthTest = false;
                            node.material.depthWrite = false;
                            node.material.linewidth = 2; // Make lines thicker
                            node.material.polygonOffset = true;
                            node.material.polygonOffsetFactor = -2; // More aggressive offset for better visibility
                            node.material.polygonOffsetUnits = -5;
                        }
                    });
                    console.log("Lines shapefile loaded successfully");
                } catch (error) {
                    console.error("Failed to load lines shapefile:", error);
                    lines = null;
                }

				// Keep line/polygon resolution in sync with the renderer size
				viewer.addEventListener("update", () => {
					const size = viewer.renderer.getSize(new THREE.Vector2());
                    if (lines && lines.setResolution) {
                        lines.setResolution(size.width, size.height);
                    }
				});

				// STEP 5: ADD THE SHAPEFILE LAYER TO THE SIDEBAR FOR TOGGLING
				viewer.onGUILoaded(() => {
					const tree = $("#jstree_scene");
					const parentNode = "other";

                    if (lines) {
						const linesID = tree.jstree("create_node", parentNode, {
							"text": "Tree Lines",
							"icon": `${Potree.resourcePath}/icons/triangle.svg`,
							"object": lines.node,
							"data": lines.node,
						}, "last", false, false);
						tree.jstree(lines.node.visible ? "check_node" : "uncheck_node", linesID);
					}
				});
			}
		});
	</script>
  </body>
</html>
