<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="description" content="La Mesa Ecopark - Tree Segmentation Viewer">
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Potree COPC Viewer - La Mesa Ecopark</title>

	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/build/potree/potree.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/openlayers3/ol.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/spectrum/spectrum.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/jstree/themes/mixed/style.css">
	
	<style>
		body {
			margin: 0;
			padding: 0;
		}

		#potree_container {
			position: absolute;
			width: 100%;
			height: 100%;
			left: 0;
			top: 0;
		}
		
		#potree_render_area {
			width: 100%;
			height: 100%;
		}
		
		.potree-panel {
			position: absolute;
			top: 10px;
			right: 10px;
			background-color: rgba(255, 255, 255, 0.8);
			padding: 10px;
			border-radius: 5px;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
			z-index: 1000;
			display: flex;
			flex-direction: column;
		}
		
		.potree-panel label {
			display: block;
			margin-bottom: 5px;
		}
		
		.potree-panel h3 {
			margin-top: 0;
			margin-bottom: 10px;
			font-size: 1em;
		}
	</style>
</head>

<body>
	<script src="/Potree_1.8.2/libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="/Potree_1.8.2/libs/spectrum/spectrum.js"></script>
	<script src="/Potree_1.8.2/libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="/Potree_1.8.2/libs/other/BinaryHeap.js"></script>
	<script src="/Potree_1.8.2/libs/tween/tween.min.js"></script>
	<script src="/Potree_1.8.2/libs/d3/d3.js"></script>
	<script src="/Potree_1.8.2/libs/proj4/proj4.js"></script>
	<script src="/Potree_1.8.2/libs/openlayers3/ol.js"></script>
	<script src="/Potree_1.8.2/libs/i18next/i18next.js"></script>
	<script src="/Potree_1.8.2/libs/jstree/jstree.js"></script>
	<script src="/Potree_1.8.2/libs/copc/index.js"></script> <!-- COPC library -->
	<script src="/Potree_1.8.2/build/potree/potree.js"></script>
	<script src="/Potree_1.8.2/libs/plasio/js/laslaz.js"></script>
	
	<div id="potree_container">
		<div id="potree_render_area"></div>
		<div id="potree_sidebar_container"></div>
	</div>
	
	<div class="potree-panel">
		<h3>COPC Point Cloud Viewer</h3>
		<div style="margin-top: 10px; font-size: 0.9em; color: #666;">
			<p id="loadingStatus">Loading COPC point cloud...</p>
			<button style="margin-top: 5px; padding: 5px;" onclick="resetView()">Reset View</button>
		</div>
	</div>
	
	<script type="module">
		import * as THREE from "/Potree_1.8.2/libs/three.js/build/three.module.js";
	
		// Initialize the viewer
		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
		
		// Configure viewer settings
		viewer.setEDLEnabled(true);
		viewer.setFOV(60);
		viewer.setPointBudget(2_500_000);
		viewer.loadSettingsFromURL();
		
		viewer.setDescription('La Mesa Ecopark COPC Point Cloud');
		
		// Load the GUI
		viewer.loadGUI(() => {
			viewer.setLanguage('en');
			$("#menu_tools").next().show();
			$("#menu_scene").next().show();
			viewer.toggleSidebar();
		});

		const loadingStatus = document.getElementById('loadingStatus');
		
		// Function to load COPC file
		async function loadCopcFile() {
			try {
				loadingStatus.textContent = "Loading COPC point cloud...";
				console.log("Attempting to load COPC file: /raw_data/lamesa_processed.copc.laz");
				
				// Try loading COPC file using the pattern from the example
				const path = "/raw_data/lamesa_processed.copc.laz";
				const name = "La Mesa Forest";
				
				Potree.loadPointCloud(path, name, (e) => {
					if (e.type === 'loading_failed') {
						loadingStatus.textContent = "Failed to load COPC point cloud. Check console for details.";
						console.error("Failed to load COPC file:", e.message || "Unknown error");
						return;
					}
					
					const pointcloud = e.pointcloud;
					const scene = viewer.scene;
					const material = pointcloud.material;
					
					scene.addPointCloud(pointcloud);
					
					material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
					material.size = 1.0;
					material.activeAttributeName = "rgba"; // Try rgba first
					
					// Set initial camera position (can be adjusted based on the actual point cloud)
					scene.view.position.set(507844.7, 1627083.5, 332.9);
					scene.view.lookAt(new THREE.Vector3(507474.9, 1627448.9, -15.1));
					
					loadingStatus.textContent = "COPC point cloud loaded successfully!";
					console.log("COPC point cloud loaded successfully!");
					
					// Fit view to the point cloud
					viewer.fitToScreen();
				});
				
			} catch (error) {
				loadingStatus.textContent = "Error loading COPC point cloud. Check console for details.";
				console.error("Error loading COPC file:", error);
				
				// Try alternative loading method as fallback
				tryFallbackLoading();
			}
		}
		
		// Fallback loading method if the first attempt fails
		function tryFallbackLoading() {
			try {
				console.log("Attempting fallback method to load COPC file");
				
				// Try the LAS file instead if COPC loading fails
				const path = "/raw_data/lamesa_processed.las";
				const name = "La Mesa Forest (LAS)";
				
				Potree.loadPointCloud(path, name, (e) => {
					if (e.type === 'loading_failed') {
						loadingStatus.textContent = "Failed to load using fallback method. Check console for details.";
						console.error("Fallback loading failed:", e.message || "Unknown error");
						return;
					}
					
					const pointcloud = e.pointcloud;
					const scene = viewer.scene;
					const material = pointcloud.material;
					
					scene.addPointCloud(pointcloud);
					
					material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
					material.size = 1.0;
					material.activeAttributeName = "rgba"; // Try rgba first
					
					// Set initial camera position (can be adjusted based on the actual point cloud)
					scene.view.position.set(507844.7, 1627083.5, 332.9);
					scene.view.lookAt(new THREE.Vector3(507474.9, 1627448.9, -15.1));
					
					loadingStatus.textContent = "Fallback loading successful!";
					console.log("Fallback loading successful!");
					
					// Fit view to the point cloud
					viewer.fitToScreen();
				});
				
			} catch (error) {
				loadingStatus.textContent = "All loading attempts failed. Please check file formats and paths.";
				console.error("All loading attempts failed:", error);
			}
		}
		
		// Function to reset view
		window.resetView = function() {
			if (viewer && viewer.scene) {
				viewer.fitToScreen();
			}
		};
		
		// Start loading the COPC file
		loadCopcFile();
	</script>
</body>
</html>
