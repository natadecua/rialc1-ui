<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="description" content="La Mesa Ecopark - Tree Segmentation Viewer">
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Potree Viewer - La Mesa Ecopark</title>

	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/build/potree/potree.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/openlayers3/ol.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/spectrum/spectrum.css">
	<link rel="stylesheet" type="text/css" href="/Potree_1.8.2/libs/jstree/themes/mixed/style.css">
    
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #errorMessage {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 10000;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body>
	<script src="/Potree_1.8.2/libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="/Potree_1.8.2/libs/spectrum/spectrum.js"></script>
	<script src="/Potree_1.8.2/libs/jquery-ui/jquery-ui.min.js"></script>
	<script src="/Potree_1.8.2/libs/other/BinaryHeap.js"></script>
	<script src="/Potree_1.8.2/libs/tween/tween.min.js"></script>
	<script src="/Potree_1.8.2/libs/d3/d3.js"></script>
	<script src="/Potree_1.8.2/libs/proj4/proj4.js"></script>
	<script src="/Potree_1.8.2/libs/openlayers3/ol.js"></script>
	<script src="/Potree_1.8.2/libs/i18next/i18next.js"></script>
	<script src="/Potree_1.8.2/libs/jstree/jstree.js"></script>
	<script src="/Potree_1.8.2/build/potree/potree.js"></script>
	<script src="/Potree_1.8.2/libs/plasio/js/laslaz.js"></script>
	<script src="/Potree_1.8.2/libs/shapefile/shapefile.js"></script>
	
	<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
		<div id="potree_render_area" style="background-image: url('/Potree_1.8.2/build/potree/resources/images/background.jpg');">
            <div id="loadingMessage" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.7);color:white;padding:20px;border-radius:10px;text-align:center;z-index:1000;">
                <div style="margin-bottom:15px;font-size:24px;">Loading point cloud...</div>
                <div class="loading-spinner"></div>
                <div id="loadingProgress" style="margin-top:15px;">Initializing...</div>
            </div>
        </div>
		<div id="potree_sidebar_container"> </div>
	</div>
	
	<script type="module">

		import * as THREE from "/Potree_1.8.2/libs/three.js/build/three.module.js";
	
        // ====================================================================================
		// STEP 1: INITIALIZE THE VIEWER
        // ====================================================================================
		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
		
		viewer.setEDLEnabled(true); // Eye-Dome Lighting helps with depth perception
		viewer.setFOV(60);
		viewer.setPointBudget(2_500_000); // Adjust as needed for performance
		viewer.loadSettingsFromURL();
		
		viewer.setDescription('La Mesa Ecopark: Tree Classification Results');
		
		viewer.loadGUI(() => {
			viewer.setLanguage('en');
			$("#menu_tools").next().show();
			$("#menu_scene").next().show();
			viewer.toggleSidebar();
		});
		
        // ====================================================================================
		// STEP 2: LOAD YOUR POINT CLOUD
        // ====================================================================================
        console.log("Loading point cloud from /raw_data/merged_recropped_brotli/metadata.json");
        
        // Show progress in the loading message
        const updateLoadingProgress = (progress) => {
            if (document.getElementById("loadingProgress")) {
                document.getElementById("loadingProgress").innerText = `Loading: ${progress}%`;
            }
        };
        
        // Setup timeout to detect stalled loading
        const loadTimeout = setTimeout(() => {
            console.error("Point cloud load timeout after 60 seconds");
            if (document.getElementById("loadingMessage")) {
                document.getElementById("loadingMessage").innerHTML = 
                    "Loading taking longer than expected.<br>Please check console for errors or refresh the page.";
            }
        }, 60000);
        
		Potree.loadPointCloud(
        "/raw_data/merged_recropped_brotli/metadata.json",
            "La Mesa Forest", 
            async e => {
			// Clear timeout since we loaded successfully
            clearTimeout(loadTimeout);
            console.log("Point cloud loaded successfully");
            
            // Remove loading message
            const loadingMessage = document.getElementById("loadingMessage");
            if (loadingMessage) {
                loadingMessage.remove();
            }
            
			let scene = viewer.scene;
			let pointcloud = e.pointcloud;
			let material = pointcloud.material;
			scene.addPointCloud(pointcloud);
			
			material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
			material.size = 1.0;
            
            // Use an attribute that's actually available in your data
            // Try rgba first, then rgb, then intensity
            console.log("Available attributes:", material.attributes);
            
            if (material.attributes && "rgba" in material.attributes) {
                material.activeAttributeName = "rgba";
            } else if (material.attributes && "rgb" in material.attributes) {
                material.activeAttributeName = "rgb";
            } else {
                material.activeAttributeName = "intensity";
            }
            
            console.log("Using attribute:", material.activeAttributeName);
			
            // ================================================================================
			// STEP 3: SET INITIAL CAMERA VIEW
			// ================================================================================
            // Get the bounding box of the point cloud for positioning
            const bbox = pointcloud.boundingBox;
            console.log("Point cloud bounds:", bbox);
            
            const center = new THREE.Vector3(
                (bbox.min.x + bbox.max.x) / 2,
                (bbox.min.y + bbox.max.y) / 2,
                (bbox.min.z + bbox.max.z) / 2
            );
            
			scene.view.position.set(
                center.x, 
                center.y - 100, 
                center.z + 200
            );
			scene.view.lookAt(center);
			
            console.log("Camera positioned at:", scene.view.position.toArray());
            console.log("Looking at center:", center.toArray());
            
            // ================================================================================
			// STEP 4: LOAD SHAPEFILES - USING SAFER APPROACH
            // ================================================================================
            try {
                // Define coordinate systems
                proj4.defs("WGS84", "+proj=longlat +ellps=WGS84 +datum=WGS84 +no_defs");
                
                // Use Philippine Reference System 1992 Zone 3 (PRS92) for point cloud
                proj4.defs("pointcloud", "+proj=tmerc +lat_0=0 +lon_0=121 +k=0.99995 +x_0=500000 +y_0=0 +ellps=clrk66 +towgs84=-127.62,-67.24,-47.04,-3.068,4.903,1.578,-1.06 +units=m +no_defs");
                
                let transform = proj4("WGS84", "pointcloud");

                // Create a parent node for all taxonomic groups
                const treeGroupsNode = new THREE.Object3D();
                treeGroupsNode.name = "Tree Taxonomic Groups";
                viewer.scene.scene.add(treeGroupsNode);
                
                console.log("Loading shapefiles...");

                // Using the approach from the working example file
                const loader = new Potree.ShapefileLoader();
                loader.transform = transform;

                // Define the groups once for reuse
                const groups = [
                    { name: "Species Group 1", color: new THREE.Color(0, 1, 0), node: new THREE.Object3D() },
                    { name: "Species Group 2", color: new THREE.Color(1, 0, 0), node: new THREE.Object3D() },
                    { name: "Species Group 3", color: new THREE.Color(0, 0, 1), node: new THREE.Object3D() },
                    { name: "Species Group 4", color: new THREE.Color(1, 1, 0), node: new THREE.Object3D() },
                    { name: "Species Group 5", color: new THREE.Color(1, 0, 1), node: new THREE.Object3D() }
                ];
                
                // Load each group separately instead of trying to clone them
                console.log("Loading shapefile for each group...");
                
                // Add all group nodes to the parent
                groups.forEach(group => {
                    group.node.name = group.name;
                    treeGroupsNode.add(group.node);
                });
                
                // Load the tree crown shapefile once for each group with its own color
                for (let group of groups) {
                    try {
                        console.log(`Loading shapefile for ${group.name}...`);
                        const shpGroup = await loader.load("/raw_data/shapefiles/mcws_crowns_newclass.shp");
                        
                        // Apply color to this group's shapefile
                        if (shpGroup && shpGroup.node) {
                            shpGroup.node.traverse(node => {
                                if (node.material) {
                                    node.material.color.copy(group.color);
                                }
                            });
                            
                            // Add to the appropriate group node
                            group.node.add(shpGroup.node);
                            
                            // Track the shapefile object for resolution updates
                            group.shapefile = shpGroup;
                        }
                    } catch (groupError) {
                        console.error(`Error loading shapefile for ${group.name}:`, groupError);
                    }
                }
                
                // This ensures line widths are rendered correctly
                viewer.addEventListener("update", () => {
                    const size = viewer.renderer.getSize(new THREE.Vector2());
                    
                    // Update resolution for each group's shapefile
                    groups.forEach(group => {
                        if (group.shapefile && group.shapefile.setResolution) {
                            try {
                                group.shapefile.setResolution(size.width, size.height);
                            } catch (e) {
                                // Silently handle any errors in resolution setting
                                console.warn(`Couldn't set resolution for ${group.name}:`, e);
                            }
                        }
                    });
                });
                
                // Add the groups to the sidebar
                viewer.onGUILoaded(() => {
                    let tree = $(`#jstree_scene`);
                    let parentNode = "other";
                    
                    let treeGroupsID = tree.jstree('create_node', parentNode, { 
                        "text": "Tree Taxonomic Groups", 
                        "icon": `${Potree.resourcePath}/icons/triangle.svg`,
                        "object": treeGroupsNode,
                        "data": treeGroupsNode,
                    }, "last", false, false);
                    
                    // Add each group as a child of the tree groups node
                    groups.forEach(group => {
                        let groupID = tree.jstree('create_node', treeGroupsID, { 
                            "text": group.name, 
                            "icon": `${Potree.resourcePath}/icons/triangle.svg`,
                            "object": group.node,
                            "data": group.node,
                        }, "last", false, false);
                        tree.jstree(group.node.visible ? "check_node" : "uncheck_node", groupID);
                    });
                });
                
            } catch (error) {
                console.error("Error in shapefile loading process:", error);
                const errorDiv = document.createElement('div');
                errorDiv.id = 'errorMessage';
                errorDiv.innerHTML = `Error loading shapefiles: ${error.message}<br><small>Check console for details</small>`;
                document.getElementById('potree_render_area').appendChild(errorDiv);
            }
		},
        // Progress callback
        xhr => {
            const progress = Math.round((xhr.loaded / xhr.total * 100));
            console.log(`${progress}% loaded`);
            updateLoadingProgress(progress);
        },
        // Error callback
        error => {
            console.error("Error loading point cloud:", error);
            document.getElementById("loadingMessage").innerHTML = 
                `<div style="color:red;font-weight:bold;">
                    Failed to load point cloud<br>
                    ${error.message || error}<br>
                    <small>Check console for details</small>
                </div>`;
        });
	</script>
</body>
</html>
